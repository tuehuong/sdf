name: Tu Dong Tao Code Va Build EXE

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 1. Tu Dong Tao File Code Quet Dong Toan Dynamic (main.py)
      shell: powershell
      run: |
        $code = @'
        import os
        import time
        import subprocess
        import threading
        from datetime import datetime
        import tkinter as tk
        from tkinter import messagebox, ttk
        import psutil
        from pywinauto import Desktop, Application
        import pywinauto
        from pynput import mouse, keyboard

        class DynamicSyncAutomationApp:
            def __init__(self, root):
                self.root = root
                self.root.title("Trinh Auto Dong Bo Quet Cua So Con v12.0")
                self.root.geometry("750x600")
                self.root.resizable(False, False)
                
                self.is_spying = False
                self.is_running = False
                self.spy_logs = []
                self.proc_pid = None
                self.desktop = Desktop(backend="uia")
                
                self.current_focused_id = None
                self.current_focused_type = None
                self.current_focused_name = None
                self.typed_buffer = ""
                
                self.create_widgets()
                
                self.mouse_listener = mouse.Listener(on_click=self.on_click)
                self.keyboard_listener = keyboard.Listener(on_press=self.on_press)
                self.mouse_listener.start()
                self.keyboard_listener.start()

            def create_widgets(self):
                cf = tk.LabelFrame(self.root, text=" 1. Duong dan phan mem can chay ", padx=10, pady=5)
                cf.pack(fill="x", padx=15, pady=5)
                tk.Label(cf, text="File (.exe):").grid(row=0, column=0, sticky="w")
                self.entry_path = tk.Entry(cf, width=60)
                self.entry_path.grid(row=0, column=1, pady=5, padx=5)
                self.entry_path.insert(0, r"C:\Windows\notepad.exe")

                lf_tree = tk.LabelFrame(self.root, text=" 2. Cay hanh dong (Tu dong quet dong toan man hinh) ", padx=10, pady=5)
                lf_tree.pack(fill="x", padx=15, pady=5)
                
                columns = ('action', 'id', 'name', 'value')
                self.tree = ttk.Treeview(lf_tree, columns=columns, show='headings', height=8)
                self.tree.heading('action', text='Hanh Dong')
                self.tree.heading('id', text='Automation ID')
                self.tree.heading('name', text='Ten Linh Kien')
                self.tree.heading('value', text='Trang thai khi chay')
                
                self.tree.column('action', width=110)
                self.tree.column('id', width=180)
                self.tree.column('name', width=160)
                self.tree.column('value', width=250)
                self.tree.pack(fill="x", expand=True)

                tf_time = tk.LabelFrame(self.root, text=" 3. Thiet lap thoi gian ngam ", padx=10, pady=5)
                tf_time.pack(fill="x", padx=15, pady=5)
                tk.Label(tf_time, text="Sau khi thao tac xong het, giu ngam may:").grid(row=0, column=0, sticky="w")
                self.entry_time_loop = tk.Entry(tf_time, width=6)
                self.entry_time_loop.grid(row=0, column=1, padx=5)
                self.entry_time_loop.insert(0, "15")
                tk.Label(tf_time, text="giay roi tu dong Reset.").grid(row=0, column=2, sticky="w")

                tf_btn = tk.Frame(self.root, pady=5)
                tf_btn.pack(fill="x", padx=15)
                self.btn_spy = tk.Button(tf_btn, text="🔴 Lam Mau Thao Tac (F7)", font=("Helvetica", 10, "bold"), bg="#ffcccc", width=22, command=self.toggle_spy)
                self.btn_spy.pack(side="left", padx=5)
                self.btn_run = tk.Button(tf_btn, text="▶️ Chay Tu Dong Auto (F8)", font=("Helvetica", 10, "bold"), bg="#ccffcc", width=22, command=self.toggle_run)
                self.btn_run.pack(side="left", padx=5)

                lf_log = tk.LabelFrame(self.root, text=" 4. Nhat ky quet dong va sua loi dong bang ")
                lf_log.pack(fill="both", expand=True, padx=15, pady=5)
                self.log_text = tk.Text(lf_log, height=6, state="disabled", bg="#f5f5f5", font=("Consolas", 9))
                self.log_text.pack(fill="both", expand=True, padx=5, pady=5)

            def write_log(self, msg):
                self.log_text.config(state="normal")
                self.log_text.insert(tk.END, msg + "\n")
                self.log_text.see(tk.END)
                self.log_text.config(state="disabled")

            def toggle_spy(self):
                if not self.is_spying:
                    if self.is_running: return
                    self.spy_logs.clear()
                    self.current_focused_id = None
                    self.typed_buffer = ""
                    for item in self.tree.get_children(): self.tree.delete(item)
                    self.is_spying = True
                    self.btn_spy.config(text="⏹️ Dung Lam Mau (F7)", bg="#ff3333", fg="white")
                    self.write_log("🔴 [F7]: Dang ghi mau. Hãy thao tác trên ứng dụng mục tiêu...")
                else:
                    self.check_and_save_buffer()
                    self.is_spying = False
                    self.btn_spy.config(text="🔴 Lam Mau Thao Tac (F7)", bg="#ffcccc", fg="black")
                    self.write_log(f"⏹️ DA LUU MAU: Ghi nho thành công {len(self.spy_logs)} buoc.")

            def on_click(self, x, y, button, pressed):
                if self.is_spying and pressed:
                    try:
                        self.check_and_save_buffer()
                        element = self.desktop.from_point(x, y)
                        info = element.element_info
                        
                        a_id = info.automation_id if info.automation_id else "N/A"
                        name = info.name if info.name else "N/A"
                        c_type = info.control_type if info.control_type else "N/A"
                        
                        self.current_focused_id = a_id
                        self.current_focused_type = c_type
                        self.current_focused_name = name
                        
                        self.spy_logs.append({
                            'action_type': 'click', 'automation_id': a_id, 'name': name, 'control_type': c_type, 'value': ''
                        })
                        self.root.after(0, self.update_tree, 'Click', a_id, name, 'Click chuot')
                    except Exception: pass

            def on_press(self, key):
                if key == keyboard.Key.f7: self.root.after(0, self.toggle_spy)
                elif key == keyboard.Key.f8: self.root.after(0, self.toggle_run)
                elif self.is_spying and self.current_focused_id:
                    try:
                        ch = key.char
                        if ch: self.typed_buffer += str(ch)
                    except AttributeError:
                        if key == keyboard.Key.space: self.typed_buffer += " "
                        elif key in [keyboard.Key.enter, keyboard.Key.tab]: self.check_and_save_buffer()

            def check_and_save_buffer(self):
                if self.typed_buffer and self.current_focused_id:
                    if self.spy_logs and self.spy_logs[-1]['automation_id'] == self.current_focused_id:
                        self.spy_logs[-1]['action_type'] = 'type_text'
                        self.spy_logs[-1]['value'] = '[AUTO_TIME_REALTIME]'
                        children = self.tree.get_children()
                        if children:
                            self.tree.item(children[-1], values=('Nhap lieu', self.current_focused_id, self.current_focused_name, '[Lay thoi gian may tinh]'))
                    self.typed_buffer = ""

            def update_tree(self, action, a_id, name, value):
                self.tree.insert('', tk.END, values=(action, a_id, name, value))

            def toggle_run(self):
                if not self.is_running:
                    if self.is_spying: return
                    if not self.spy_logs:
                        messagebox.showwarning("Canh bao", "Ban chua thuc hien thao tac lam mau (F7)!")
                        return
                    self.is_running = True
                    self.btn_run.config(text="⏹️ Dung Vong Lap (F8)", bg="#ff3333", fg="white")
                    threading.Thread(target=self.automation_engine, daemon=True).start()
                else:
                    self.is_running = False
                    self.btn_run.config(text="▶️ Chay Tu Dong Auto (F8)", bg="#ccffcc", fg="black")
                    self.write_log("⏹️ DA NGUNG TIEN TRINH TU DONG.")
                    self.kill_process()

            def kill_process(self):
                if self.proc_pid:
                    try:
                        p = psutil.Process(self.proc_pid)
                        p.kill()
                        self.write_log(f"-> Da tat sach tien trinh PID: {self.proc_pid}")
                    except: pass
                    self.proc_pid = None

            def automation_engine(self):
                path_app = self.entry_path.get()
                exe_name = os.path.basename(path_app)
                try: delay_reset = int(self.entry_time_loop.get())
                except: delay_reset = 15

                loop_count = 1
                while self.is_running:
                    self.write_log(f"\n🔄 === CHU KY TU DONG HOA THU {loop_count} ===")
                    self.write_log(f"-> Khoi dong phan mem: {exe_name}")
                    
                    try:
                        proc = subprocess.Popen(path_app)
                        self.proc_pid = proc.pid
                    except Exception as e:
                        self.write_log(f"❌ Loi mo file exe: {e}")
                        self.is_running = False
                        break

                    # FIX LOI DONG BANG: Tu dong tim linh kien tren pham vi TOAN MAN HINH (Desktop Level)
                    self.write_log("-> [SMART WAIT]: Dang doi linh kien dau tien xuat hien tren man hinh...")
                    
                    # Thuc thi chuoi thao tac bang cach quet dong
                    for act in self.spy_logs:
                        if not self.is_running: break
                        
                        elem = None
                        start_wait = time.time()
                        is_timeout = False
                        
                        # Tim kiem linh kien lien tuc moi 0.5s, gioi han doi toi da 15s cho moi buoc
                        while self.is_running:
                            try:
                                if act['automation_id'] != "N/A":
                                    elem = self.desktop.window(automation_id=act['automation_id'], control_type=act['control_type'])
                                elif act['name'] != "N/A":
                                    elem = self.desktop.window(title=act['name'], control_type=act['control_type'])
                                
                                if elem.exists() and elem.is_visible():
                                    break
                            except Exception: pass
                            
                            if time.time() - start_wait > 15: # Qua 15s ko thay thi tu bo qua de tranh treo code
                                is_timeout = True
                                break
                            time.sleep(0.5)
                        
                        if is_timeout:
                            self.write_log(f"   ⚠ Bo qua buoc do tim kiem qua lau: [{act['control_type']}] ID: {act['automation_id']}")
                            continue
                            
                        if elem and self.is_running:
                            try:
                                # Dua cua so chua linh kien do len focus truoc khi tuong tac
                                try:
                                    top_win = elem.top_level_parent()
                                    top_win.set_focus()
                                except: pass
                                
                                if act['action_type'] == 'click':
                                    try:
                                        elem.click_input()
                                    except:
                                        rect = elem.rectangle()
                                        center_x = (rect.left + rect.right) // 2
                                        center_y = (rect.top + rect.bottom) // 2
                                        pywinauto.mouse.click(coords=(center_x, center_y))
                                    self.write_log(f"   ✓ Thao tac: [{act['control_type']}] '{act['name']}'")
                                    
                                elif act['action_type'] == 'type_text':
                                    elem.click_input()
                                    time.sleep(0.3)
                                    current_time_str = datetime.now().strftime("%d/%m/%Y %H:%M:%S")
                                    elem.type_keys(current_time_str, with_spaces=True, with_tabs=True, clear=True)
                                    self.write_log(f"   ✓ [Realtime Time]: Tu dong dien '{current_time_str}'")
                            except Exception as e:
                                self.write_log(f"   ⚠ Thao tac loi nhiem vu: {e}")
                            time.sleep(1.5)
                                
                    if not self.is_running: break
                    self.write_log(f"-> Hoan thanh chuoi click! Giu ngam may trong {delay_reset} giay...")
                    for _ in range(delay_reset):
                        if not self.is_running: break
                        time.sleep(1)
                        
                    if self.is_running:
                        self.write_log("-> Dang don dep va xoa tien trinh de ve chu ky moi...")
                        self.kill_process()
                        time.sleep(2)
                        
                    loop_count += 1

        if __name__ == "__main__":
            root = tk.Tk()
            app = DynamicSyncAutomationApp(root)
            root.mainloop()
        '@
        Out-File -FilePath "main.py" -InputObject $code -Encoding utf8

    - name: 2. Cai Dat Thu Vien Toan Dien
      run: |
        python -m pip install --upgrade pip
        pip install pynput pywinauto psutil pyinstaller

    - name: 3. Dong Goi File Exe Hoan Chinh
      run: |
        python -m PyInstaller --noconfirm --onefile --windowed main.py

    - name: 4. Xuat Thanh Pham Chinh Thuc
      uses: actions/upload-artifact@v4
      with:
        name: Tool_SuaLoiDongBang_v12
        path: dist/main.exe
